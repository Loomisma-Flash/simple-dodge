<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Simple Dodge Game</title>

<style>
html,body{
    height:100%;
    margin:0;
    background:#111;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:sans-serif;
    overflow:hidden;
}

/* GAME CANVAS (SCALES ON MOBILE) */
canvas{
    background:#0b1220;
    border:4px solid #222;
    width:90vw;
    max-width:640px; /* ~3x feel on phones */
    height:auto;
}

/* INFO TEXT */
#info{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    font-size:16px;
}

/* MOBILE CONTROLS */
#mobileControls{
    position:fixed;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 30px;
}

/* BIGGER BUTTONS */
#mobileControls button, #shootBtn, #resetBtn{
    width:100px;
    height:90px;
    font-size:48px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    color:white;
}

/* SHOOT BUTTON */
#shootBtn{
    position:fixed;
    bottom:80px;
    right:30px;
    background:rgba(255,200,0,0.3);
}

/* RESET BUTTON */
#resetBtn{
    position:fixed;
    bottom:80px;
    left:30px;
    background:rgba(0,150,255,0.3);
}

button:active{
    background:rgba(255,255,255,0.5);
}
</style>
</head>

<body>

<div id="info">Move ◀ ▶ | Shoot 🔥 | Reset ↺</div>

<canvas id="c" width="400" height="640"></canvas>

<div id="mobileControls">
    <button id="leftBtn">◀</button>
    <button id="rightBtn">▶</button>
</div>

<button id="shootBtn">🔥</button>
<button id="resetBtn">↺</button>

<script>
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let player, bullets, enemies, keys, gameOver, score, spawnTimer, speedMultiplier, highScore, shake;

highScore = localStorage.getItem('dodgeHigh') || 0;

function reset(){
    player = {w:48,h:12,x:(W-48)/2,y:H-36,speed:8};
    enemies = [];
    bullets = [];
    keys = {};
    gameOver = false;
    score = 0;
    spawnTimer = 0;
    speedMultiplier = 1;
    shake = 0;
}

function spawnEnemy(){
    const w = 16 + Math.random()*40;
    enemies.push({
        x: Math.random()*(W-w),
        y: -w,
        w,
        h: w,
        speed: 2.5 + Math.random()*1.2 + speedMultiplier*0.8
    });
}

/* KEYBOARD */
window.addEventListener('keydown', e=>{
    keys[e.key.toLowerCase()] = true;
    if(e.key === ' ') shoot();
    if(e.key === 'r') reset();
});

window.addEventListener('keyup', e=>{
    keys[e.key.toLowerCase()] = false;
});

/* SHOOT */
function shoot(){
    if(gameOver) return;
    bullets.push({
        x: player.x + player.w/2 - 3,
        y: player.y,
        w: 6,
        h: 10,
        speed: 10
    });
}

/* MOBILE BUTTONS */
const leftBtn = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');
const shootBtn = document.getElementById('shootBtn');
const resetBtn = document.getElementById('resetBtn');

leftBtn.addEventListener('touchstart', e=>{
    e.preventDefault();
    keys['arrowleft'] = true;
});
leftBtn.addEventListener('touchend', ()=> keys['arrowleft'] = false);

rightBtn.addEventListener('touchstart', e=>{
    e.preventDefault();
    keys['arrowright'] = true;
});
rightBtn.addEventListener('touchend', ()=> keys['arrowright'] = false);

shootBtn.addEventListener('touchstart', e=>{
    e.preventDefault();
    shoot();
});

/* RESET BUTTON */
resetBtn.addEventListener('touchstart', e=>{
    e.preventDefault();
    reset();
});

/* GAME LOOP */
function update(){
    if(gameOver) return;

    if(keys['arrowleft']||keys['a']) player.x -= player.speed;
    if(keys['arrowright']||keys['d']) player.x += player.speed;

    player.x = Math.max(0, Math.min(W-player.w, player.x));

    spawnTimer--;
    if(spawnTimer <= 0){
        spawnEnemy();
        spawnTimer = Math.max(10, 50 - Math.floor(score/3));
        speedMultiplier = 1 + score/100;
    }

    for(let i=enemies.length-1;i>=0;i--){
        const e = enemies[i];
        e.y += e.speed;

        if(e.y > H){
            enemies.splice(i,1);
            score++;
        }

        if(e.x < player.x+player.w && e.x+e.w > player.x &&
           e.y < player.y+player.h && e.y+e.h > player.y){
            gameOver = true;
            shake = 10;

            if(score > highScore){
                highScore = score;
                localStorage.setItem('dodgeHigh', highScore);
            }
        }
    }

    for(let i=bullets.length-1;i>=0;i--){
        const b = bullets[i];
        b.y -= b.speed;
        if(b.y < 0) bullets.splice(i,1);
    }

    for(let i=enemies.length-1;i>=0;i--){
        const e = enemies[i];
        for(let j=bullets.length-1;j>=0;j--){
            const b = bullets[j];
            if(b.x < e.x+e.w && b.x+b.w > e.x &&
               b.y < e.y+e.h && b.y+b.h > e.y){
                enemies.splice(i,1);
                bullets.splice(j,1);
                score += 2;
                break;
            }
        }
    }
}

/* DRAW */
function draw(){
    ctx.fillStyle = '#071219';
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle = '#4FE3A1';
    roundRect(ctx, player.x, player.y, player.w, player.h, 4, true);

    for(const e of enemies){
        ctx.fillStyle = '#E35B5B';
        roundRect(ctx, e.x, e.y, e.w, e.h, 6, true);
    }

    ctx.fillStyle = '#FFD166';
    for(const b of bullets){
        ctx.fillRect(b.x, b.y, b.w, b.h);
    }

    ctx.fillStyle = '#9fcbdc';
    ctx.font = '16px monospace';
    ctx.fillText('Score: ' + score, 10, 22);
    ctx.fillText('High: ' + highScore, W-120, 22);

    if(gameOver){
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, H/2-60, W, 120);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = '28px monospace';
        ctx.fillText('Game Over', W/2, H/2);
        ctx.textAlign = 'left';
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

function roundRect(ctx,x,y,w,h,r,fill){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
    if(fill) ctx.fill();
}

reset();
loop();
</script>
</body>
</html>
