<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Simple Dodge Game</title> <!-- This is the browser tab name -->
    <style>
        html,body{height:100%;margin:0;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-family:sans-serif}
        canvas{background:#0b1220;border:4px solid #222;image-rendering:pixelated}
        #info{position:fixed;top:10px;left:50%;transform:translateX(-50%);text-align:center}
    </style>
</head>
<body>
    <div id="info">Use ← → or A D to move. Press R to restart. Press Space to shoot!</div>
    <canvas id="c" width="480" height="640"></canvas>
<script>
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let player, bullets, enemies, keys, gameOver, score, spawnTimer, speedMultiplier, highScore, shake;

// Initialize or load high score from browser
highScore = localStorage.getItem('dodgeHigh') || 0;

function reset(){
    player = {w:48,h:12,x:(W-48)/2,y:H-36,speed:8};
    enemies = [];
    bullets = [];
    keys = {};
    gameOver = false;
    score = 0;
    spawnTimer = 0;
    speedMultiplier = 1;
    shake = 0;
}

function spawnEnemy(){
    const w = 16 + Math.random()*40;
    enemies.push({
        x: Math.random()*(W-w),
        y: -w,
        w,
        h: w,
        speed: 2.5 + Math.random()*1.2 + speedMultiplier*0.8
    });
}

// Keyboard input
window.addEventListener('keydown', e=>{
    keys[e.key.toLowerCase()]=true;

    // Shoot bullets
    if(e.key === ' ' && !gameOver){
        bullets.push({
            x: player.x + player.w/2 - 3,
            y: player.y,
            w: 6,
            h: 10,
            speed: 10
        });
    }

    if(e.key==='r' && gameOver) reset();
});
window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

function update(){
    if(gameOver) return;

    // Move player
    if(keys['arrowleft']||keys['a']) player.x -= player.speed;
    if(keys['arrowright']||keys['d']) player.x += player.speed;
    player.x = Math.max(0, Math.min(W-player.w, player.x));

    // Spawn enemies
    spawnTimer -= 1;
    if(spawnTimer <= 0){
        spawnEnemy();
        spawnTimer = Math.max(10, 50 - Math.floor(score/3)); // faster with score
        speedMultiplier = 1 + score/100;
    }

    // Update enemies
    for(let i=enemies.length-1;i>=0;i--){
        const e = enemies[i];
        e.y += e.speed;

        // Enemy passes bottom
        if(e.y > H){ enemies.splice(i,1); score += 1; }

        // Collision with player
        if(e.x < player.x+player.w && e.x+e.w > player.x && e.y < player.y+player.h && e.y+e.h > player.y){
            gameOver = true;
            shake = 10;

            // Save high score if beaten
            if(score > highScore){
                highScore = score;
                localStorage.setItem('dodgeHigh', highScore);
            }
        }
    }

    // Update bullets
    for(let i = bullets.length-1; i >= 0; i--){
        const b = bullets[i];
        b.y -= b.speed;
        if(b.y < 0) bullets.splice(i,1);
    }

    // Bullet-enemy collisions
    for(let i=enemies.length-1;i>=0;i--){
        const e = enemies[i];
        for(let j=bullets.length-1;j>=0;j--){
            const b = bullets[j];
            if(b.x < e.x+e.w && b.x+b.w > e.x && b.y < e.y+e.h && b.y+b.h > e.y){
                enemies.splice(i,1);
                bullets.splice(j,1);
                score += 2;
                break;
            }
        }
    }
}

function draw(){
    // Optional screen shake
    if(shake > 0){
        ctx.save();
        ctx.translate((Math.random()-0.5)*10, (Math.random()-0.5)*10);
        shake--;
    }

    // Background
    ctx.fillStyle = '#071219';
    ctx.fillRect(0,0,W,H);

    // Player
    ctx.fillStyle = '#4FE3A1';
    roundRect(ctx, player.x, player.y, player.w, player.h, 4, true);

    // Enemies
    for(const e of enemies){
        ctx.fillStyle = '#E35B5B';
        roundRect(ctx, e.x, e.y, e.w, e.h, 6, true);
    }

    // Bullets
    ctx.fillStyle = '#FFD166';
    for(const b of bullets){
        ctx.fillRect(b.x, b.y, b.w, b.h);
    }

    // UI
    ctx.fillStyle = '#9fcbdc';
    ctx.font = '16px monospace';
    ctx.fillText('Score: ' + score, 10, 22);
    ctx.fillText('High: ' + highScore, W-120, 22);

    // Game over overlay
    if(gameOver){
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, H/2-60, W, 120);
        ctx.fillStyle = '#fff';
        ctx.font = '28px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('Game Over', W/2, H/2-8);
        ctx.font = '16px monospace';
        ctx.fillText('Press R to restart — Score: ' + score, W/2, H/2+22);
        ctx.textAlign = 'left';
    }

    if(shake > 0) ctx.restore();
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

function roundRect(ctx,x,y,w,h,r,fill){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
    if(fill) ctx.fill(); else ctx.stroke();
}

reset();
loop();
</script>
</body>
</html>
